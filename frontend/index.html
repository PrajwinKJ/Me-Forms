<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Forms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Minimal Forms</div>
        <nav>
            <button onclick="navigate('create-form')" class="nav-btn active" id="nav-create-form">Create Form</button>
            <button onclick="navigate('fill-form')" class="nav-btn" id="nav-fill-form">Fill Form</button>
            <button onclick="navigate('responses')" class="nav-btn" id="nav-responses">Responses</button>
            <button onclick="logout()" class="nav-btn" id="nav-logout" style="display: none;">Logout</button>
        </nav>
    </header>

    <main class="container">
        <!-- VIEW: Auth (Login / Signup) -->
        <section id="view-auth" class="view-section" style="display: none;">
            <div class="card" style="max-width: 400px; margin: 40px auto;">
                <h2 id="auth-title">Login</h2>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="form-group row">
                        <input type="email" id="auth-email" placeholder="Email" class="input-main" required>
                    </div>
                    <div class="form-group row" style="margin-bottom: 24px;">
                        <input type="password" id="auth-password" placeholder="Password" class="input-main" required>
                    </div>
                    <div class="actions-row" style="flex-direction: column; gap: 12px; align-items: stretch;">
                        <button type="submit" class="btn btn-primary" id="auth-submit-btn">Login</button>
                        <button type="button" class="btn btn-secondary" id="auth-toggle-btn" onclick="toggleAuthMode()">Need an account? Sign up</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- VIEW: Create Form -->
        <section id="view-create-form" class="view-section active">
            <div class="card">
                <h2>Create a new Form</h2>
                <div class="form-group row">
                    <input type="text" id="form-title" placeholder="Form Title" class="input-large">
                </div>
                <div class="form-group row">
                    <textarea id="form-desc" placeholder="Form Description" class="input-main"></textarea>
                </div>
                
                <div id="questions-container">
                    <!-- Dynamic questions appended here via JS -->
                </div>
                
                <div class="actions-row">
                    <button onclick="addQuestion()" class="btn btn-secondary">+ Add Question</button>
                    <button onclick="saveForm()" class="btn btn-primary">Save Form</button>
                </div>
            </div>
        </section>

        <!-- VIEW: Fill Form -->
        <section id="view-fill-form" class="view-section" style="display: none;">
            <div class="card" id="fill-form-container">
                <div class="empty-state">No form selected. Create a form first.</div>
            </div>
        </section>

        <!-- VIEW: Responses Dashboard -->
        <section id="view-responses" class="view-section" style="display: none;">
            <div class="card" id="responses-container">
                <div class="empty-state">No responses yet.</div>
            </div>
        </section>
    </main>

    <div class="modal-backdrop" id="logout-modal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="logout-modal-title">
            
            <h2 id="logout-modal-title">Confirm Logout</h2>
            <p class="modal-text">You are about to end your session. This will require you to log in again to create or view form responses</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeLogoutModal()">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmLogout()">Logout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
