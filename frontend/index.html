<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Forms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Minimal Forms</div>
        <nav>
            <button onclick="navigate('create-form')" class="nav-btn active" id="nav-create-form">Create Form</button>
            <button onclick="navigate('fill-form')" class="nav-btn" id="nav-fill-form">Fill Form</button>
            <button onclick="navigate('responses')" class="nav-btn" id="nav-responses">Responses</button>
        </nav>
    </header>

    <main class="container">
        <!-- VIEW: Create Form -->
        <section id="view-create-form" class="view-section active">
            <div class="card">
                <h2>Create a new Form</h2>
                <div class="form-group row">
                    <input type="text" id="form-title" placeholder="Form Title" class="input-large">
                </div>
                <div class="form-group row">
                    <textarea id="form-desc" placeholder="Form Description" class="input-main"></textarea>
                </div>
                
                <div id="questions-container">
                    <!-- Dynamic questions appended here via JS -->
                </div>
                
                <div class="actions-row">
                    <button onclick="addQuestion()" class="btn btn-secondary">+ Add Question</button>
                    <button onclick="saveForm()" class="btn btn-primary">Save Form</button>
                </div>
            </div>
        </section>

        <!-- VIEW: Fill Form -->
        <section id="view-fill-form" class="view-section" style="display: none;">
            <div class="card" id="fill-form-container">
                <div class="empty-state">No form selected. Create a form first.</div>
            </div>
        </section>

        <!-- VIEW: Responses Dashboard -->
        <section id="view-responses" class="view-section" style="display: none;">
            <div class="card" id="responses-container">
                <div class="empty-state">No responses yet.</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
